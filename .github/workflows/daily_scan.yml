name: Daily Crunchyroll Dub Scanner

on:
  schedule:
    # 22:00 UTC is exactly 6:00 PM Eastern Time
    - cron: '0 22 * * *'
  
  # This line allows you to click a button on GitHub to test run it manually anytime
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down the python code files from the repository
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # 2. Spin up a clean Python environment on the virtual server
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Download the specific layout scrapers we need
    - name: Install Scraping Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    # 4. Fire off the script while securely injecting your Discord token
    - name: Run Scanner Script
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: python feed_scanner.py