name: Daily Crunchyroll Dub Scanner

on:
  schedule:
    # 03:15 UTC is exactly 11:15 PM Eastern Time (EDT)
    - cron: '15 16 * * *'
  workflow_dispatch:

# Added permissions block allowing GitHub to write files back to your repository
permissions:
  contents: write

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        persist-credentials: true # Crucial for pulling/pushing changes

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Scraping Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-genai

    - name: Run Scanner Script
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python feed_scanner.py

    # Automatically save database updates back into your repo
    - name: Commit and Save Database Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add anime_tracker.db || true
        git commit -m "Auto-updated anime schedule logs [skip ci]" || true
        git push origin master || true